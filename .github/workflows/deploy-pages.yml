name: Deploy Web release to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Web release
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.7
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Godot export templates
        shell: bash
        run: |
          template_source="/root/.local/share/godot/export_templates/4.7.stable"
          template_target="$HOME/.local/share/godot/export_templates/4.7.stable"
          if [[ "$template_source" != "$template_target" ]]; then
            mkdir -p "$(dirname "$template_target")"
            cp -a "$template_source" "$template_target"
          fi

      - name: Set build commit
        shell: bash
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          sed -i "s|config/build_sha=\"\"|config/build_sha=\"$short_sha\"|" project.godot

      - name: Import project resources
        run: godot --headless --path . --import

      - name: Export Web release
        run: |
          mkdir -p build
          godot --headless --path . --export-release Web build/index.html
          touch build/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
